# Render's free instances spin down after ~15 idle minutes, so this pings
# every 10 (GitHub cron is best-effort; occasional cold starts of ~1 min are
# the accepted cost). It also doubles as a liveness alarm: the run fails
# loudly in the Actions tab if the backend stops answering. Set the
# SPACE_URL repository variable to the deployed URL.
name: keep backend awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping the backend
        env:
          SPACE_URL: ${{ vars.SPACE_URL }}
        run: |
          if [ -z "$SPACE_URL" ]; then
            echo "SPACE_URL repository variable not set, skipping"
            exit 0
          fi
          curl --fail --silent --show-error --max-time 60 "$SPACE_URL/health"
