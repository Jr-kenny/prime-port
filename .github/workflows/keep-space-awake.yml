# Free Hugging Face Spaces go to sleep after ~48h without traffic. A ping
# every 6 hours keeps the backend warm; it also doubles as a liveness check
# (the run fails loudly in the Actions tab if the Space stops answering).
# Set the SPACE_URL repository variable to the Space's direct URL, e.g.
# https://<user>-prime-port.hf.space
name: keep space awake

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping the backend
        env:
          SPACE_URL: ${{ vars.SPACE_URL }}
        run: |
          if [ -z "$SPACE_URL" ]; then
            echo "SPACE_URL repository variable not set, skipping"
            exit 0
          fi
          curl --fail --silent --show-error --max-time 60 "$SPACE_URL/health"
